<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Weather App</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


    <h1>🌤 Weather App</h1>


    <div class="search-box">

        <input 
        type="text" 
        id="city"
        placeholder="Enter city name">

        <button onclick="getWeather()">
            Search
        </button>

    </div>



    <div class="weather-card">


        <h2 id="location">
            City
        </h2>


        <img id="icon" src="">


        <h1 id="temperature">
            --°C
        </h1>


        <h3 id="condition">
            Weather Condition
        </h3>



        <div class="details">


            <div>
                <p>💧 Humidity</p>
                <h3 id="humidity">
                    --
                </h3>
            </div>



            <div>
                <p>🌬 Wind</p>
                <h3 id="wind">
                    --
                </h3>
            </div>



            <div>
                <p>🌡 Pressure</p>
                <h3 id="pressure">
                    --
                </h3>
            </div>


        </div>


    </div>


</div>


<script src="script.js"></script>

</body>

</html>
